<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Isaac Abraham | Sidequest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --container-bg: #121212;
            --text-color: #e0e0e0;
            --accent-color: #888888;
            --sidebar-bg: rgba(10, 10, 10, 0.95);
            --matrix-green: #00ff41;
            --transition-speed: 0.3s;
        }

        body.light-mode {
            --bg-color: #f5f5f7;
            --container-bg: #ffffff;
            --text-color: #1d1d1f;
            --accent-color: #86868b;
            --sidebar-bg: rgba(255, 255, 255, 0.95);
        }

        body.matrix-mode {
            --bg-color: #000000;
            --container-bg: rgba(0, 0, 0, 0.85);
            --text-color: var(--matrix-green);
            --accent-color: #008f11;
            --sidebar-bg: rgba(0, 15, 0, 0.95);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Roboto', sans-serif;
            transition: background var(--transition-speed), color var(--transition-speed);
            line-height: 1.6;
            min-height: 100vh;
            overflow-x: hidden;
        }

        body.matrix-mode { font-family: 'Courier New', Courier, monospace; }

        #matrix-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            display: none;
            opacity: 0.6;
        }
        body.matrix-mode #matrix-canvas { display: block; }

        nav {
            max-width: 800px;
            margin: 0 auto;
            padding: 50px 20px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .menu-btn {
            cursor: pointer;
            z-index: 1001;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        .menu-btn div {
            width: 24px;
            height: 2px;
            background-color: var(--text-color);
            transition: var(--transition-speed);
        }

        .title-text {
            letter-spacing: 1px; 
            font-weight: 700; 
            text-transform: uppercase;
        }

        .sidebar {
            position: fixed;
            top: 0; left: -300px;
            width: 300px; height: 100%;
            background: var(--sidebar-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 1000;
            padding: 100px 40px;
            transition: transform 0.5s cubic-bezier(0.77,0.2,0.05,1.0);
            border-right: 1px solid rgba(255,255,255,0.1);
        }

        .sidebar.active { transform: translateX(300px); }

        .sidebar ul { list-style: none; }
        .sidebar li { 
            margin: 25px 0; 
            cursor: pointer; 
            font-size: 1.1rem; 
            transition: color 0.2s;
        }
        .sidebar li:hover { color: var(--accent-color); }

        .submenu {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s ease;
            padding-left: 15px;
        }
        .submenu.show { max-height: 200px; margin-top: 10px; }

        .theme-opt {
            display: block;
            background: none;
            border: 1px solid var(--accent-color);
            color: var(--text-color);
            padding: 8px 15px;
            margin: 10px 0;
            width: 100%;
            text-align: left;
            cursor: pointer;
            font-family: 'Roboto', sans-serif;
            font-size: 0.9rem;
            border-radius: 4px;
        }

        .container { max-width: 800px; margin: 0 auto; padding: 20px; }

        .post-wrapper {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .avatar {
            width: 50px; height: 50px;
            border-radius: 50%;
            flex-shrink: 0;
            background-image: url('https://ik.imagekit.io/ttepbs1gq/goose%20(1).jpg');
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .msg-bubble {
            background-color: var(--container-bg);
            border-radius: 14px;
            padding: 24px;
            flex-grow: 1;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .footer-info {
            margin-left: 70px;
            font-size: 0.85rem;
            color: var(--accent-color);
            margin-bottom
